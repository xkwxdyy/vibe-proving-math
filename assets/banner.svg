<svg width="1200" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Mathematical symbols decoration (subtle) -->
  <g opacity="0.08" fill="#fff">
    <text x="50" y="50" font-size="40" font-family="serif">∀∃∫∑∏√</text>
    <text x="150" y="280" font-size="35" font-family="serif">∇∂∞≈≡⊆</text>
    <text x="900" y="70" font-size="45" font-family="serif">∈∉∪∩⊂⊃</text>
    <text x="1000" y="270" font-size="38" font-family="serif">λμπθφω</text>
  </g>

  <!-- Geometric shapes -->
  <circle cx="100" cy="150" r="80" fill="none" stroke="#4a90e2" stroke-width="1" opacity="0.15"/>
  <circle cx="100" cy="150" r="60" fill="none" stroke="#4a90e2" stroke-width="1" opacity="0.12"/>
  <polygon points="1050,100 1120,180 980,180" fill="none" stroke="#e94560" stroke-width="1" opacity="0.15"/>
  <rect x="1030" y="200" width="100" height="60" fill="none" stroke="#e94560" stroke-width="1" opacity="0.12"/>

  <!-- Main title -->
  <text x="600" y="130"
        font-family="'Georgia', serif"
        font-size="72"
        font-weight="300"
        fill="#ffffff"
        text-anchor="middle"
        filter="url(#glow)">
    vibe_proving
  </text>

  <!-- Subtitle -->
  <text x="600" y="175"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="24"
        fill="#a8dadc"
        text-anchor="middle"
        letter-spacing="2">
    数学工作者的推理伙伴
  </text>

  <!-- Tagline -->
  <text x="600" y="210"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="16"
        fill="#94b8d1"
        text-anchor="middle"
        opacity="0.9">
    Learn · Solve · Review · Formalize · Discover
  </text>

  <!-- Bottom accent line -->
  <line x1="300" y1="250" x2="900" y2="250" stroke="#4a90e2" stroke-width="2" opacity="0.4"/>
  <line x1="350" y1="255" x2="850" y2="255" stroke="#e94560" stroke-width="1" opacity="0.3"/>
</svg>
